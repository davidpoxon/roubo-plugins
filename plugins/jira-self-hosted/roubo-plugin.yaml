id: jira-self-hosted
name: Self-hosted Jira
version: 0.1.0
description: Roubo integration for self-hosted Atlassian Jira (Data Center 8.14+). PAT auth, configurable blocks / blocked-by link-type mapping.
kind: integration
roubo: ^1.0.0
entry: ./dist/index.js
icon: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path d="M0 12C0 5.37258 5.37258 0 12 0H36C42.6274 0 48 5.37258 48 12V36C48 42.6274 42.6274 48 36 48H12C5.37258 48 0 42.6274 0 36V12Z" fill="%231868DB"/><path d="M17.9475 31.0469H15.2429C11.1638 31.0469 8.23755 28.5484 8.23755 24.8899H22.7804C23.5341 24.8899 24.0218 25.4252 24.0218 26.1837V40.8178C20.3861 40.8178 17.9475 37.8731 17.9475 33.7684V31.0469ZM25.1303 23.7745H22.4257C18.3466 23.7745 15.4203 21.3206 15.4203 17.6621H29.9631C30.7168 17.6621 31.2489 18.1528 31.2489 18.9113V33.5454C27.6132 33.5454 25.1303 30.6007 25.1303 26.496V23.7745ZM32.3573 16.5467H29.6527C25.5736 16.5467 22.6473 14.0482 22.6473 10.3896H37.1902C37.9439 10.3896 38.4316 10.925 38.4316 11.6389V26.273C34.7959 26.273 32.3573 23.3283 32.3573 19.2236V16.5467Z" fill="white"/></svg>'
configSchema:
  type: object
  required:
    - instance
    - pat
  properties:
    instance:
      type: string
      title: Jira instance URL
      description: e.g. https://jira.acme.example
      format: uri
    pat:
      type: string
      title: Personal access token
      description: Data Center personal access token (8.14+). Stored in the OS keyring.
      format: password
    blocksLinkTypeName:
      type: string
      title: '"blocks" link-type name'
      default: blocks
      description: Override if your Jira admin renamed the default link type.
    isBlockedByLinkTypeName:
      type: string
      title: '"is blocked by" link-type name'
      default: is blocked by
    allowSelfSignedTls:
      type: boolean
      title: Allow self-signed TLS
      default: false
      description: Trust self-signed or internal-CA certificates for this instance. Only enable for an on-prem Jira whose certificate you trust; it disables certificate verification for every request to this instance.
defaultIntegrationConfig:
  # Only-to-do default (FR-012, issue #558): the cut list is for picking up new
  # work, so by default it excludes both the In Progress and Done categories,
  # leaving only genuinely ready To-Do items. Category-first exclusion is the
  # source of truth: on a supporting instance the JQL builder emits
  # `statusCategory not in ("In Progress", "Done")`. The status-name list below
  # is the best-effort fallback used only when an instance does not support
  # `statusCategory` in JQL (Spike C / issue #554); it names the In-Progress-
  # and Done-category statuses so the fallback matches the same intent. Where a
  # workflow uses non-standard in-progress status names, the user configures the
  # exact names per project via the status-exclusion control (FR-013).
  excludedStatusCategories:
    - In Progress
    - Done
  excludedStatuses:
    - In Progress
    - In Review
    - Closed
    - Done
    - Resolved
permissions:
  network:
    # The Jira instance host is user-supplied (configured per project), so the
    # static manifest cannot name a concrete host. The host constrains this `**`
    # to the configured instance host at the host.fetch boundary (#338); the
    # plugin also re-asserts it in `src/jira-client.ts` as defense-in-depth.
    hosts:
      - "**"
  credentials:
    slots:
      - slot: pat
        scope: read
        description: Jira personal access token (Data Center 8.14+).
  filesystem:
    paths: []
  processes: false
