name: dco

# Thin caller for roubo's shared, reusable DCO check. roubo is the single
# source of truth for the check logic; this stub owns the pull_request trigger
# and concurrency. The reusable workflow reads github.event.pull_request.* from
# this caller's context, which is available because this caller is triggered by
# pull_request.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco:
    uses: davidpoxon/roubo/.github/workflows/dco-reusable.yml@main
