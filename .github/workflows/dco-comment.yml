name: dco-comment

# Thin caller for roubo's shared, reusable privileged DCO comment workflow.
# roubo is the single source of truth for the comment logic; this stub owns the
# workflow_run trigger and passes the run-id / head-sha the reusable workflow
# needs. The privileged workflow_run context runs from this repo's default
# branch, so it can hold pull-requests: write and comment on fork PRs.
on:
  workflow_run:
    workflows: [dco]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  comment:
    if: github.event.workflow_run.event == 'pull_request'
    uses: davidpoxon/roubo/.github/workflows/dco-comment-reusable.yml@main
    with:
      run-id: ${{ github.event.workflow_run.id }}
      head-sha: ${{ github.event.workflow_run.head_sha }}
